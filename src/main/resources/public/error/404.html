<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página não encontrada - 404</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
            color: #333;
            text-align: center;
            padding-top: 100px;
            margin: 0;
        }
        .error-container {
            background-color: #fff;
            max-width: 600px;
            margin: 0 auto;
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 100px;
            color: #D10024; /* Vermelho padrão da sua loja */
            margin: 0;
        }
        h2 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: #D10024;
            color: white;
            text-decoration: none;
            border-radius: 40px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #a8001d;
        }
    </style>
</head>
<body>

<div class="error-container">
    <h1>404</h1>
    <h2>Oops! Você se perdeu.</h2>
    <p>A página que você está procurando não existe, foi removida ou o link está quebrado.</p>
    <a href="/index" class="btn">Voltar para a Vitrine Segura</a>
</div>

</body>
</html>
