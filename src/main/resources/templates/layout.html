<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(titulo)">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title th:text="${titulo}">Loja de Suplementos</title>

    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,500,700" rel="stylesheet">

    <link type="text/css" rel="stylesheet" th:href="@{/css/bootstrap.min.css}"/>
    <link type="text/css" rel="stylesheet" th:href="@{/css/slick.css}"/>
    <link type="text/css" rel="stylesheet" th:href="@{/css/slick-theme.css}"/>
    <link type="text/css" rel="stylesheet" th:href="@{/css/nouislider.min.css}"/>
    <link type="text/css" rel="stylesheet" th:href="@{/css/font-awesome.min.css}"/>
    <link type="text/css" rel="stylesheet" th:href="@{/css/style.css}"/>
</head>

<body>

<div th:fragment="nav">
    <header>
        <div id="top-header">
            <div class="container">
                <ul class="header-links pull-right">
                    <li>
                        <a href="#">
                            <i class="fa fa-hand-paper-o"></i> Olá, <span sec:authentication="name">Usuário</span>!
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <i class="fa fa-user-o"></i> Minha Conta
                        </a>
                    </li>
                    <li>
                        <form th:action="@{/logout}" method="post" style="display:inline; margin-left: 15px;">
                            <button type="submit" style="background: none; border: none; color: white; padding: 0; font-family: inherit; cursor: pointer;">
                                <i class="fa fa-sign-out"></i>
                                Sair
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
        <div id="header">
            <div class="container">
                <div class="row">
                    <div class="col-md-3">
                        <div class="header-logo">
                            <a th:href="@{/index}" class="logo" style="display: flex; align-items: center; gap: 8px; text-decoration: none;">
                                <i class="fa fa-dumbbell" style="font-size: 24px; color: #D10024;"></i>
                                <span style="font-size: 20px; font-weight: 700; color: #2B2D42; text-transform: uppercase; letter-spacing: 1px;">Loja de Suplementos</span>
                            </a>
                        </div>
                    </div>

                    <div class="col-md-6"></div>

                    <div class="col-md-3 clearfix">
                        <div class="header-ctn">
                            <div>
                                <a th:href="@{/verCarrinho}">
                                    <i class="fa fa-shopping-cart"></i>
                                    <span>Carrinho</span>
                                    <div class="qty" th:text="${session.carrinho != null ? session.carrinho.size() : 0}">0</div>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <nav id="navigation">
        <div class="container">
            <div id="responsive-nav">
                <ul class="main-nav nav navbar-nav">
                    <li class="active"><a th:href="@{/index}">Catálogo (Vitrine)</a></li>
                    <li><a th:href="@{/admin}" sec:authorize="hasRole('ADMIN')">Painel Admin</a></li>
                </ul>
            </div>
        </div>
    </nav>
</div>

<div th:fragment="alertas" class="container" style="margin-top: 20px;">

    <div th:if="${mensagemSucesso}" class="alert alert-success alert-dismissible" role="alert">
        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
            <span aria-hidden="true">&times;</span>
        </button>
        <i class="fa fa-check-circle"></i> <strong th:text="${mensagemSucesso}">Mensagem de sucesso</strong>
    </div>

    <div th:if="${mensagemErro}" class="alert alert-danger alert-dismissible" role="alert">
        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
            <span aria-hidden="true">&times;</span>
        </button>
        <i class="fa fa-exclamation-circle"></i> <strong th:text="${mensagemErro}">Mensagem de erro</strong>
    </div>

</div>

<footer th:fragment="footer" id="footer">
    <div class="section">
        <div class="container">
            <div class="row">
                <div class="col-md-12 text-center">
                        <span class="copyright">
                            Loja de Suplementos EAJ
                        </span>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/jquery.min.js}"></script>
    <script th:src="@{/js/bootstrap.min.js}"></script>
    <script th:src="@{/js/slick.min.js}"></script>
    <script th:src="@{/js/nouislider.min.js}"></script>
    <script th:src="@{/js/jquery.zoom.min.js}"></script>
    <script th:src="@{/js/main.js}"></script>
</footer>

</body>
</html>
