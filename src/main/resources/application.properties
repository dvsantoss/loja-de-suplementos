spring.application.name=loja-suplementos

# Conexão dinamica com o PostgreSQL (Se DB_URL não existir na nuvem, usa o localhost)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/loja_suplementos}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Faz o Spring analisar a classe Suplemento e criar a tabela automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Mostra no console os comandos SQL sendo executados
spring.jpa.show-sql=true

# Garante que o Spring leia a porta correta do Render
server.port=${PORT:8080}
